<svg viewBox="0 0 900 280" xmlns="http://www.w3.org/2000/svg" width="900" height="280">
  <defs>

    <!-- Background gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#0d0d1f"/>
      <stop offset="45%"  stop-color="#1a0a2e"/>
      <stop offset="100%" stop-color="#0d1a2e"/>
    </linearGradient>

    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="6" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <filter id="sparkGlow" x="-100%" y="-100%" width="300%" height="300%">
      <feGaussianBlur in="SourceGraphic" stdDeviation="2.5" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>

    <linearGradient id="shimmer" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#ffffff"/>
      <stop offset="40%"  stop-color="#e2d4f7"/>
      <stop offset="70%"  stop-color="#c084fc"/>
      <stop offset="100%" stop-color="#22d3ee"/>
    </linearGradient>

    <clipPath id="waveClip">
      <rect width="900" height="280"/>
    </clipPath>

  </defs>

  <!-- Background -->
  <rect width="900" height="280" fill="url(#bg)"/>

  <g opacity="0.04" stroke="#a855f7" stroke-width="0.5">
    <line x1="0" y1="56"  x2="900" y2="56"/>
    <line x1="0" y1="112" x2="900" y2="112"/>
    <line x1="0" y1="168" x2="900" y2="168"/>
    <line x1="0" y1="224" x2="900" y2="224"/>
    <line x1="90"  y1="0" x2="90"  y2="280"/>
    <line x1="180" y1="0" x2="180" y2="280"/>
    <line x1="270" y1="0" x2="270" y2="280"/>
    <line x1="360" y1="0" x2="360" y2="280"/>
    <line x1="450" y1="0" x2="450" y2="280"/>
    <line x1="540" y1="0" x2="540" y2="280"/>
    <line x1="630" y1="0" x2="630" y2="280"/>
    <line x1="720" y1="0" x2="720" y2="280"/>
    <line x1="810" y1="0" x2="810" y2="280"/>
  </g>

  <ellipse cx="180" cy="140" rx="160" ry="100" fill="#7c3aed" opacity="0.08">
    <animate attributeName="opacity" values="0.06;0.12;0.06" dur="5s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="720" cy="140" rx="160" ry="100" fill="#a855f7" opacity="0.08">
    <animate attributeName="opacity" values="0.08;0.14;0.08" dur="6s" repeatCount="indefinite"/>
  </ellipse>
  <ellipse cx="450" cy="260" rx="300" ry="60" fill="#22d3ee" opacity="0.04">
    <animate attributeName="opacity" values="0.03;0.07;0.03" dur="7s" repeatCount="indefinite"/>
  </ellipse>

  <g transform="translate(95,55)" filter="url(#sparkGlow)">
    <polygon points="0,-9 2,-2 9,0 2,2 0,9 -2,2 -9,0 -2,-2" fill="#c084fc" opacity="0">
      <animate attributeName="opacity" values="0;1;0" dur="2.8s" begin="0s"    repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" values="0;45;0" dur="2.8s" begin="0s" repeatCount="indefinite"/>
    </polygon>
  </g>

  <g transform="translate(800,48)" filter="url(#sparkGlow)">
    <polygon points="0,-11 2.5,-2.5 11,0 2.5,2.5 0,11 -2.5,2.5 -11,0 -2.5,-2.5" fill="#a855f7" opacity="0">
      <animate attributeName="opacity" values="0;0.9;0" dur="3.4s" begin="0.7s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" values="0;45;0" dur="3.4s" begin="0.7s" repeatCount="indefinite"/>
    </polygon>
  </g>

  <g transform="translate(240,88)" filter="url(#sparkGlow)">
    <polygon points="0,-7 1.6,-1.6 7,0 1.6,1.6 0,7 -1.6,1.6 -7,0 -1.6,-1.6" fill="#22d3ee" opacity="0">
      <animate attributeName="opacity" values="0;1;0" dur="2.2s" begin="0.3s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" values="0;45;0" dur="2.2s" begin="0.3s" repeatCount="indefinite"/>
    </polygon>
  </g>

  <g transform="translate(658,88)" filter="url(#sparkGlow)">
    <polygon points="0,-7 1.6,-1.6 7,0 1.6,1.6 0,7 -1.6,1.6 -7,0 -1.6,-1.6" fill="#e879f9" opacity="0">
      <animate attributeName="opacity" values="0;0.85;0" dur="2.6s" begin="1.1s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" values="0;45;0" dur="2.6s" begin="1.1s" repeatCount="indefinite"/>
    </polygon>
  </g>

  <g transform="translate(130,210)" filter="url(#sparkGlow)">
    <polygon points="0,-8 1.8,-1.8 8,0 1.8,1.8 0,8 -1.8,1.8 -8,0 -1.8,-1.8" fill="#a855f7" opacity="0">
      <animate attributeName="opacity" values="0;0.9;0" dur="3.1s" begin="1.8s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" values="0;45;0" dur="3.1s" begin="1.8s" repeatCount="indefinite"/>
    </polygon>
  </g>

  <g transform="translate(775,215)" filter="url(#sparkGlow)">
    <polygon points="0,-9 2,-2 9,0 2,2 0,9 -2,2 -9,0 -2,-2" fill="#c084fc" opacity="0">
      <animate attributeName="opacity" values="0;1;0" dur="2.5s" begin="0.5s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" values="0;45;0" dur="2.5s" begin="0.5s" repeatCount="indefinite"/>
    </polygon>
  </g>

  <g transform="translate(570,42)" filter="url(#sparkGlow)">
    <polygon points="0,-6 1.4,-1.4 6,0 1.4,1.4 0,6 -1.4,1.4 -6,0 -1.4,-1.4" fill="#38bdf8" opacity="0">
      <animate attributeName="opacity" values="0;0.8;0" dur="1.9s" begin="2.2s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" values="0;45;0" dur="1.9s" begin="2.2s" repeatCount="indefinite"/>
    </polygon>
  </g>

  <g transform="translate(335,40)" filter="url(#sparkGlow)">
    <polygon points="0,-6 1.4,-1.4 6,0 1.4,1.4 0,6 -1.4,1.4 -6,0 -1.4,-1.4" fill="#f0abfc" opacity="0">
      <animate attributeName="opacity" values="0;0.75;0" dur="2.3s" begin="0.9s" repeatCount="indefinite"/>
      <animateTransform attributeName="transform" type="rotate" values="0;45;0" dur="2.3s" begin="0.9s" repeatCount="indefinite"/>
    </polygon>
  </g>

  <g fill="#fff">
    <circle cx="55"  cy="30"  r="1.2" opacity="0.5"><animate attributeName="opacity" values="0.2;0.8;0.2" dur="3s" begin="0s"   repeatCount="indefinite"/></circle>
    <circle cx="845" cy="25"  r="1"   opacity="0.4"><animate attributeName="opacity" values="0.2;0.9;0.2" dur="4s" begin="1s"   repeatCount="indefinite"/></circle>
    <circle cx="450" cy="18"  r="1.4" opacity="0.5"><animate attributeName="opacity" values="0.3;1;0.3"   dur="2.5s" begin="0.5s" repeatCount="indefinite"/></circle>
    <circle cx="200" cy="250" r="1"   opacity="0.3"><animate attributeName="opacity" values="0.1;0.7;0.1" dur="3.5s" begin="2s"   repeatCount="indefinite"/></circle>
    <circle cx="700" cy="255" r="1.2" opacity="0.4"><animate attributeName="opacity" values="0.2;0.8;0.2" dur="2.8s" begin="1.5s" repeatCount="indefinite"/></circle>
    <circle cx="42"  cy="180" r="0.9" opacity="0.3"><animate attributeName="opacity" values="0.1;0.6;0.1" dur="4.2s" begin="0.2s" repeatCount="indefinite"/></circle>
    <circle cx="858" cy="170" r="1"   opacity="0.4"><animate attributeName="opacity" values="0.2;0.7;0.2" dur="3.8s" begin="1.2s" repeatCount="indefinite"/></circle>
    <circle cx="310" cy="260" r="0.8" opacity="0.3"><animate attributeName="opacity" values="0.1;0.5;0.1" dur="5s"   begin="0.8s" repeatCount="indefinite"/></circle>
    <circle cx="590" cy="262" r="1"   opacity="0.3"><animate attributeName="opacity" values="0.1;0.6;0.1" dur="4.5s" begin="2.5s" repeatCount="indefinite"/></circle>
  </g>

  <text x="450" y="148" text-anchor="middle"
        font-family="'Segoe UI', Arial, sans-serif"
        font-size="76" font-weight="800" letter-spacing="3"
        fill="#a855f7" opacity="0.35" filter="url(#glow)">Sooha</text>

  <text x="450" y="148" text-anchor="middle"
        font-family="'Segoe UI', Arial, sans-serif"
        font-size="76" font-weight="800" letter-spacing="3"
        fill="url(#shimmer)">Sooha
    <animate attributeName="opacity" values="0;1" dur="1s" fill="freeze"/>
  </text>

  <!-- Subtitle -->
  <text x="450" y="192" text-anchor="middle"
        font-family="'Courier New', monospace"
        font-size="16" letter-spacing="1.5" fill="#94a3b8">
    Cybersec Student  ·  Threat Intelligence  ·  Aspiring Researcher
    <animate attributeName="opacity" values="0;0.9" dur="1.4s" fill="freeze"/>
  </text>

  <line x1="300" y1="207" x2="600" y2="207" stroke="url(#shimmer)" stroke-width="0.8" opacity="0.4">
    <animate attributeName="opacity" values="0.1;0.5;0.1" dur="4s" repeatCount="indefinite"/>
  </line>

  <!-- Bottom wave shape -->
  <path d="M0,258 Q225,238 450,258 Q675,278 900,258 L900,280 L0,280 Z" fill="#0d0d1f" opacity="0.7"/>

</svg>
